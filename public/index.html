<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公司文件</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📁</text></svg>"
    />
  </head>
  <body>
    <!-- 登录 / 注册界面 -->
    <div id="login-view" class="login-view hidden">
      <form id="login-form" class="login-card">
        <div class="login-logo">📁</div>
        <h1 id="auth-title">公司文件</h1>
        <p class="login-sub" id="auth-sub">登录以浏览和下载文件</p>
        <label>
          用户名
          <input id="login-username" type="text" autocomplete="username" required />
        </label>
        <label>
          密码
          <input id="login-password" type="password" autocomplete="current-password" required />
        </label>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" id="login-btn">登录</button>
        <p class="auth-switch">
          <span id="switch-text">还没有账号？</span>
          <a id="switch-link" href="#">注册新账号</a>
        </p>
      </form>
    </div>

    <!-- 文件浏览主界面 -->
    <div id="app-view" class="app-view hidden">
      <header class="topbar">
        <div class="brand"><span class="brand-icon">📁</span> 公司文件</div>
        <div class="topbar-right">
          <div class="search">
            <input id="search" type="search" placeholder="在当前文件夹中筛选文件…" />
          </div>
          <button id="myfolder-btn" class="btn-ghost hidden">📁 我的文件夹</button>
          <button id="dept-btn" class="btn-ghost hidden">👑 部门管理</button>
          <button id="admin-btn" class="btn-primary hidden">管理后台</button>
          <span id="who" class="who"></span>
          <button id="logout-btn" class="btn-ghost">退出登录</button>
        </div>
      </header>

      <nav class="breadcrumb" id="breadcrumb"></nav>

      <main class="content">
        <div id="toolbar" class="toolbar hidden">
          <input id="file-input" type="file" multiple hidden />
          <button id="upload-btn" class="btn-primary">⬆ 上传文件</button>
          <button id="mkdir-btn" class="btn-ghost">＋ 新建文件夹</button>
          <span id="upload-status" class="upload-status"></span>
        </div>
        <div id="loading" class="state hidden">加载中…</div>
        <div id="error" class="state error hidden"></div>
        <div id="empty" class="state hidden">此文件夹为空。</div>
        <div id="no-access" class="state hidden">
          <div class="no-access-card">
            <div class="no-access-icon">🔒</div>
            <h2>暂无可访问的文件夹</h2>
            <p>您的账号尚未被授予任何文件夹的访问权限，请联系管理员开通。</p>
          </div>
        </div>
        <div id="drive-home" class="drive-home hidden"></div>
        <table id="file-table" class="file-table hidden">
          <thead>
            <tr>
              <th class="col-name">名称</th>
              <th class="col-size">大小</th>
              <th class="col-date">修改时间</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="file-list"></tbody>
        </table>
      </main>
    </div>

    <!-- 管理后台 -->
    <div id="admin-view" class="app-view hidden">
      <header class="topbar">
        <div class="brand"><span class="brand-icon">🛠️</span> 管理后台</div>
        <div class="topbar-right">
          <button id="admin-usage-btn" class="btn-ghost">📊 存储用量</button>
          <button id="admin-activity-btn" class="btn-ghost">🕒 活动统计</button>
          <button id="admin-audit-btn" class="btn-ghost">📜 审计日志</button>
          <button id="admin-back-btn" class="btn-ghost">返回文件</button>
        </div>
      </header>
      <main class="content">
        <div id="admin-error" class="state error hidden"></div>

        <!-- 角色管理 -->
        <section class="admin-section">
          <div class="section-head">
            <h2>角色管理</h2>
            <button id="admin-new-role-btn" class="btn-primary">+ 新建角色</button>
          </div>
          <p class="section-desc">
            角色是一组文件夹的集合。把角色分配给用户后，用户即可访问该角色包含的所有文件夹。
          </p>
          <table class="file-table admin-table">
            <thead>
              <tr>
                <th class="col-rolename">角色名称</th>
                <th>包含的文件夹</th>
                <th class="col-admin-actions">操作</th>
              </tr>
            </thead>
            <tbody id="admin-role-list"></tbody>
          </table>
        </section>

        <!-- 用户管理 -->
        <section class="admin-section">
          <div class="section-head">
            <h2>用户管理</h2>
            <button id="admin-new-btn" class="btn-primary">+ 新建用户</button>
          </div>
          <p class="section-desc">
            每个用户可同时拥有多个角色，并可被额外授予指定的文件夹。最终可访问范围 =
            所有角色的文件夹 ＋ 额外授予的文件夹。
          </p>
          <table class="file-table admin-table">
            <thead>
              <tr>
                <th>用户名</th>
                <th class="col-role">管理员</th>
                <th>角色</th>
                <th>有效可访问范围</th>
                <th class="col-admin-actions">操作</th>
              </tr>
            </thead>
            <tbody id="admin-user-list"></tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- 通用模态框 -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h3 id="modal-title">标题</h3>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
